server:
  port: ${SERVER_PORT:${PORT:8080}}
  # Staging enables framework processing explicitly in application-staging.yml.
  # The base stays conservative so local/direct traffic cannot spoof proxy data.
  forward-headers-strategy: none
  servlet:
    session:
      cookie:
        name: ${SESSION_COOKIE_NAME:__Host-M4TRUST_SESSION}
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: lax
        path: /

spring:
  application:
    name: m4trust-core-api
  rabbitmq:
    # The relay requires broker confirms before an outbox row can be marked published.
    # Connection credentials remain environment-specific.
    publisher-confirm-type: ${RABBITMQ_PUBLISHER_CONFIRM_TYPE:correlated}
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  flyway:
    # Normal deployed replicas never own schema rollout. Local development
    # opts in via application-local.yml; deployments use the image's one-shot
    # `m4trust-core-api migrate` command before starting the web process.
    enabled: false
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  session:
    timeout: ${SESSION_IDLE_TIMEOUT:30m}
    jdbc:
      initialize-schema: never

app:
  # Deploy-time environment label (e.g. local, staging, production).
  # Falls back to the active Spring profile, then to "local".
  environment: ${APP_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:local}}
  # Release identity used as the stable structured-log version field.
  version: ${APP_VERSION:unknown}
  git-commit-sha: ${GIT_COMMIT_SHA:unknown}
  build-time: ${BUILD_TIME:unknown}
  security:
    session:
      absolute-timeout: ${SESSION_ABSOLUTE_TIMEOUT:8h}
  object-storage:
    endpoint: ${OBJECT_STORAGE_ENDPOINT}
    region: ${OBJECT_STORAGE_REGION}
    bucket: ${OBJECT_STORAGE_BUCKET}
    access-key: ${OBJECT_STORAGE_ACCESS_KEY}
    secret-key: ${OBJECT_STORAGE_SECRET_KEY}
    upload-ttl: ${OBJECT_STORAGE_UPLOAD_TTL}
    download-ttl: ${OBJECT_STORAGE_DOWNLOAD_TTL}
    max-upload-size-bytes: ${OBJECT_STORAGE_MAX_UPLOAD_SIZE_BYTES}
  messaging:
    topology:
      enabled: ${MESSAGING_TOPOLOGY_ENABLED:false}
    relay:
      enabled: ${MESSAGING_RELAY_ENABLED:false}
      fixed-delay: ${MESSAGING_RELAY_FIXED_DELAY:5s}
      claim-timeout: ${MESSAGING_RELAY_CLAIM_TIMEOUT:1m}
      batch-size: ${MESSAGING_RELAY_BATCH_SIZE:20}
      confirm-timeout: ${MESSAGING_RELAY_CONFIRM_TIMEOUT:10s}

logging:
  structured:
    format:
      console: logstash
    json:
      # Logstash already supplies level and message. MDC fields are included
      # automatically; CorrelationIdFilter supplies the correlationId key.
      rename:
        "@timestamp": timestamp
      add:
        service: ${spring.application.name}
        environment: ${app.environment}
        version: ${app.version}
        gitCommitSha: ${app.git-commit-sha}
        buildTime: ${app.build-time}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
      probes:
        enabled: true
      show-details: when-authorized
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    build:
      enabled: true
    env:
      # The env contributor exposes only the controlled `info.*` namespace,
      # not arbitrary environment variables or secrets.
      enabled: true

info:
  app:
    name: ${spring.application.name}
    environment: ${app.environment}
    version: ${app.version}
    gitCommitSha: ${app.git-commit-sha}
    buildTime: ${app.build-time}
