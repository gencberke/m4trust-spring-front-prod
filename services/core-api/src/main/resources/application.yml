server:
  port: ${SERVER_PORT:${PORT:8080}}
  servlet:
    session:
      cookie:
        name: ${SESSION_COOKIE_NAME:__Host-M4TRUST_SESSION}
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: lax
        path: /

spring:
  application:
    name: m4trust-core-api
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  session:
    timeout: ${SESSION_IDLE_TIMEOUT:30m}
    jdbc:
      initialize-schema: never

app:
  # Deploy-time environment label (e.g. local, staging, production).
  # Falls back to the active Spring profile, then to "local".
  environment: ${APP_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:local}}
  # Release identity used as the stable structured-log version field.
  version: ${APP_VERSION:unknown}
  security:
    session:
      absolute-timeout: ${SESSION_ABSOLUTE_TIMEOUT:8h}

logging:
  structured:
    format:
      console: logstash
    json:
      # Logstash already supplies level and message. MDC fields are included
      # automatically; CorrelationIdFilter supplies the correlationId key.
      rename:
        "@timestamp": timestamp
      add:
        service: ${spring.application.name}
        environment: ${app.environment}
        version: ${app.version}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
      probes:
        enabled: true
      show-details: when-authorized
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    build:
      enabled: true
    env:
      enabled: false

info:
  app:
    name: ${spring.application.name}
    environment: ${app.environment}
