        '401': {$ref: '#/components/responses/SessionRequired'}
        '403': {$ref: '#/components/responses/LegalEntityAccessDenied'}
        '404': {$ref: '#/components/responses/FundingPlanNotFoundOrHidden'}
  /funding-units/{fundingUnitId}/payment-operations:
    post:
      operationId: initiatePaymentOperation
      tags: [Funding]
      summary: Initiate a payment operation on a funding unit without awaiting the provider
      description: >
        Buyer entity ADMIN-only action; Idempotency-Key is required. The request carries
        the target FundingUnit expectedVersion. The durable intent, dispatch/outbox
        record, audit entry, and HTTP idempotency result are committed in one short
        transaction before this response is returned; the provider is never called
        within the request or its transaction. Returns 202 with the CREATED operation
        projection. A CREATED or UNCONFIRMED operation is the unit's only in-flight
        operation: replaying the same Idempotency-Key returns the same operation, a
        different key returns 409, and a FUNDED unit rejects any new operation with 409.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/FundingUnitId'
        - $ref: '#/components/parameters/LegalEntityContext'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentOperationRequest'
      responses:
        '202':
          description: >
            Durable CREATED payment operation accepted for dispatch; the provider result
            is resolved later and observed only through polling reads.
          headers:
            Location:
              description: Same-origin path of the created payment operation.
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PaymentOperation'}
        '400': {$ref: '#/components/responses/MalformedRequest'}
        '401': {$ref: '#/components/responses/SessionRequired'}
        '403': {$ref: '#/components/responses/FundingMutationForbidden'}
        '404': {$ref: '#/components/responses/FundingUnitNotFoundOrHidden'}
        '409': {$ref: '#/components/responses/PaymentOperationInitiateConflict'}
        '422': {$ref: '#/components/responses/ValidationFailed'}
  /payment-operations/{paymentOperationId}:
    get:
      operationId: getPaymentOperation
      tags: [Funding]
      summary: Get one payment operation projection for polling
      description: >
        Participant-readable safe operation projection: status, explicit
        reconciliation-required indication, and an opaque non-PII provider reference.
        Raw provider payloads, card data, credentials, and other PII are never returned.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/PaymentOperationId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Payment operation projection visible to the active Deal participant.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PaymentOperation'}
        '400': {$ref: '#/components/responses/MalformedRequest'}
        '401': {$ref: '#/components/responses/SessionRequired'}
        '403': {$ref: '#/components/responses/LegalEntityAccessDenied'}
        '404': {$ref: '#/components/responses/PaymentOperationNotFoundOrHidden'}
  /payment-operations/{paymentOperationId}/reconcile:
    post:
      operationId: reconcilePaymentOperation
      tags: [Funding]
      summary: Dispatch query-first reconciliation for an UNCONFIRMED payment operation
      description: >
        Buyer entity ADMIN-only action; Idempotency-Key is required. The request carries
        the target PaymentOperation expectedVersion. This command never calls the
        provider within the request: it commits a durable reconciliation dispatch/audit/
        idempotency record in one short transaction and returns 202 with the same
        operation Location. A relay later queries the same operation using its unchanged
        provider key and applies a definitive result in a separate transaction. Replaying
        the same Idempotency-Key returns the same result and Location; a different
        request with the same key returns 409.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/PaymentOperationId'
        - $ref: '#/components/parameters/LegalEntityContext'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconcilePaymentOperationRequest'
      responses:
        '202':
          description: >
            Durable reconciliation dispatch accepted; the provider query result is
            resolved later and observed only through polling reads of the same operation.
          headers:
            Location:
              description: Same-origin path of the target payment operation.
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PaymentOperation'}
        '400': {$ref: '#/components/responses/MalformedRequest'}
        '401': {$ref: '#/components/responses/SessionRequired'}
        '403': {$ref: '#/components/responses/FundingMutationForbidden'}
        '404': {$ref: '#/components/responses/PaymentOperationNotFoundOrHidden'}
        '409': {$ref: '#/components/responses/PaymentOperationReconcileConflict'}
        '422': {$ref: '#/components/responses/ValidationFailed'}
