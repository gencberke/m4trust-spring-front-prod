  /deals/{dealId}/ratification-packages:
    post:
      operationId: createRatificationPackage
      tags: [Deal Ratification]
      summary: Create an immutable ratification package
      description: >
        Initiator-only DRAFT action. The request always carries the exact commercial
        terms to ratify; accepted MONEY rules are suggestions only and the server
        never selects terms silently. Parties, a current accepted rule-set, and a
        current AVAILABLE document are required. Creating with different terms
        supersedes a current PENDING package under the Deal lock. Idempotency-Key
        replays the original package for the same canonical request; reuse with a
        different request returns 409 IDEMPOTENCY_KEY_REUSED.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRatificationPackageRequest'
      responses:
        '201':
          description: Created immutable package; idempotent replay returns the original package.
          headers:
            Location:
              description: Same-origin path of the created ratification package.
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RatificationPackageDetail'}
