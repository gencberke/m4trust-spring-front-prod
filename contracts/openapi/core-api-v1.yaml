      description: >
        Returns the Deal's single FundingPlan with its single FundingUnit, the unit's
        current PaymentOperation when one exists, and the Deal-level FundingStatus
        business projection. Returns 404 until a plan has been created. All Deal
        participants may read; only buyer entity ADMIN may mutate.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
