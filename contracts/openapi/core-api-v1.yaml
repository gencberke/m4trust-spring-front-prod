        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Retained package history visible to the active Deal participant.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RatificationPackageHistory'}
        '400': {$ref: '#/components/responses/MalformedRequest'}
        '401': {$ref: '#/components/responses/SessionRequired'}
        '403': {$ref: '#/components/responses/LegalEntityAccessDenied'}
        '404': {$ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'}
  /deals/{dealId}/ratification-packages/{ratificationPackageId}:
    get:
      operationId: getRatificationPackage
