openapi: 3.1.0
info:
  title: M4Trust Core API
  version: 1.0.0
  description: Reviewed design contract for the same-origin Spring API consumed by the M4Trust frontend.
servers:
  - url: /api/v1
    description: Same-origin public API v1
tags:
  - name: Authentication
    description: Browser session registration, login, logout, and current-user operations.
  - name: Security
    description: Browser security bootstrap operations.
  - name: Legal Entities
    description: Legal entity creation, membership bootstrap, and organization-scoped reads.
paths:
  /auth/register:
    post:
      operationId: register
      tags: [Authentication]
      summary: Register a user and create an authenticated session
      description: >
        Creates the user and automatically establishes a server-side authenticated
        session. The browser receives the opaque session only as an HttpOnly cookie.
      security:
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered and authenticated session created.
          headers:
            Location:
              description: Same-origin current-user projection path.
              schema:
                type: string
                format: uri-reference
                const: /api/v1/auth/me
            Set-Cookie:
              $ref: '#/components/headers/SessionCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '403':
          $ref: '#/components/responses/CsrfRejected'
        '409':
          $ref: '#/components/responses/EmailAlreadyExists'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /auth/login:
    post:
      operationId: login
      tags: [Authentication]
      summary: Authenticate with email and password
      description: >
        Authenticates without revealing whether an account exists and regenerates
        the server-side session identifier on success.
      security:
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded and the public current user is returned.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SessionCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/InvalidCredentials'
        '403':
          $ref: '#/components/responses/CsrfRejected'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /auth/logout:
    post:
      operationId: logout
      tags: [Authentication]
      summary: End the current authenticated session
      description: Invalidates the current server-side session and clears its cookie.
      security:
        - SessionCookie: []
          CsrfToken: []
      responses:
        '204':
          description: Session invalidated successfully; no response body is returned.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SessionCookie'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/CsrfRejected'
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [Authentication]
      summary: Get the authenticated current-user bootstrap projection
      description: >
        Returns public user fields plus the user's legal entity memberships. The
        memberships array is always present and may be empty. Active legal entity
        selection is client state and is not stored as authoritative server session state.
      security:
        - SessionCookie: []
      responses:
        '200':
          description: Active authenticated user and membership bootstrap projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/SessionRequired'
  /security/csrf:
    get:
      operationId: getCsrfToken
      tags: [Security]
      summary: Get the CSRF token for unsafe requests
      description: >
        Returns the token and header name required for unsafe browser requests.
        The token is not an authentication credential or a session identifier.
      security: []
      responses:
        '200':
          description: Current CSRF token and required request header name.
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfToken'
  /legal-entities:
    post:
      operationId: createLegalEntity
      tags: [Legal Entities]
      summary: Create a legal entity
      description: >
        Creates a legal entity in the authenticated user's tenant and creates an
        ADMIN membership for the authenticated user in the same operation. This
        bootstrap operation does not use X-M4Trust-Legal-Entity-Id because no active
        legal entity is required before creation.
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLegalEntityRequest'
      responses:
        '201':
          description: Legal entity created and creator assigned the ADMIN role.
          headers:
            Location:
              description: Same-origin path of the created legal entity.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalEntity'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/CsrfRejected'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    get:
      operationId: listLegalEntityMemberships
      tags: [Legal Entities]
      summary: List the authenticated user's legal entity memberships
      description: >
        Returns only legal entities in which the authenticated user has a membership.
        This intentionally small bootstrap list is unpaginated but uses a stable public
        list DTO. It does not require X-M4Trust-Legal-Entity-Id.
      security:
        - SessionCookie: []
      responses:
        '200':
          description: The user's legal entity memberships; items is empty when none exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalEntityMembershipList'
        '401':
          $ref: '#/components/responses/SessionRequired'
  /legal-entities/{legalEntityId}:
    get:
      operationId: getLegalEntity
      tags: [Legal Entities]
      summary: Get a legal entity detail
      description: >
        Organization-scoped read. The legal entity context header must identify the
        same legal entity as the path and is verified against the authenticated user's
        memberships. A missing, malformed, or mismatched context header returns 403.
        A nonexistent legal entity and an entity hidden from a non-member both return
        the same 404 response so existence is not disclosed.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/LegalEntityId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Legal entity visible to the authenticated member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalEntity'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/LegalEntityNotFoundOrHidden'
  /legal-entities/{legalEntityId}/members:
    get:
      operationId: listLegalEntityMembers
      tags: [Legal Entities]
      summary: List members of a legal entity
      description: >
        Organization-scoped read. The legal entity context header must identify the
        same legal entity as the path and is verified against the authenticated user's
        memberships. A missing, malformed, or mismatched context header returns 403.
        A nonexistent legal entity and an entity hidden from a non-member both return
        the same 404 response so existence and membership data are not disclosed.
        The Slice 2 member list is unpaginated and uses a stable public list DTO.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/LegalEntityId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Legal entity members; items is never null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalEntityMemberList'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/LegalEntityNotFoundOrHidden'
components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: __Host-M4TRUST_SESSION
      description: >
        Opaque server-side session cookie. Production uses this HttpOnly, Secure,
        SameSite=Lax, Path=/ cookie without a Domain attribute. Local development
        uses the documented non-Secure M4TRUST_SESSION variant. Client JavaScript
        must never read, copy, or log the cookie.
    CsrfToken:
      type: apiKey
      in: header
      name: X-CSRF-TOKEN
      description: >
        CSRF token returned by GET /security/csrf and required on unsafe requests.
        It is not an authentication credential or a session identifier.
  headers:
    SessionCookie:
      description: >
        Server-managed HttpOnly session cookie. Browsers handle this header; client
        JavaScript must not read or log the opaque value.
      schema:
        type: string
    NoStore:
      description: Prevents storage of security bootstrap responses.
      schema:
        type: string
        const: no-store
  parameters:
    LegalEntityId:
      name: legalEntityId
      in: path
      required: true
      description: Public UUID of the requested legal entity.
      schema:
        type: string
        format: uuid
    LegalEntityContext:
      name: X-M4Trust-Legal-Entity-Id
      in: header
      required: true
      description: >
        Client-selected legal entity context. This header is neither an authentication
        credential nor proof of authorization. It must be a UUID equal to the
        legalEntityId path parameter and is verified server-side against membership.
        Missing, malformed, or mismatched values produce LEGAL_ENTITY_ACCESS_DENIED.
      schema:
        type: string
        format: uuid
  responses:
    MalformedRequest:
      description: Request JSON cannot be parsed; Problem Details code is MALFORMED_REQUEST.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ValidationFailed:
      description: Request fields are invalid; Problem Details code is VALIDATION_FAILED.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    InvalidCredentials:
      description: >
        Authentication failed without revealing whether the account exists;
        Problem Details code is AUTH_INVALID_CREDENTIALS.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    EmailAlreadyExists:
      description: Normalized email already exists; Problem Details code is AUTH_EMAIL_ALREADY_EXISTS.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    SessionRequired:
      description: >
        No active authenticated session exists; Problem Details code is
        AUTH_SESSION_EXPIRED for missing, invalid, or expired sessions.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    CsrfRejected:
      description: CSRF validation failed; Problem Details code is CSRF_TOKEN_INVALID.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    LegalEntityAccessDenied:
      description: >
        Required legal entity context is missing, malformed, or does not match the
        requested organization scope; Problem Details code is LEGAL_ENTITY_ACCESS_DENIED.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    LegalEntityNotFoundOrHidden:
      description: >
        Legal entity does not exist or is hidden because the authenticated user is not
        a member; both cases use the same Problem Details code LEGAL_ENTITY_NOT_FOUND.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
  schemas:
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 320
          description: Email is trimmed and normalized case-insensitively for uniqueness.
        password:
          type: string
          minLength: 15
          maxLength: 128
          writeOnly: true
          description: Plaintext password accepted only for this request and never returned or logged.
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: User-visible display name after trimming.
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 320
        password:
          type: string
          minLength: 1
          maxLength: 128
          writeOnly: true
          description: Plaintext credential accepted only for this request and never returned or logged.
    PublicUser:
      type: object
      additionalProperties: false
      description: >
        Authentication success projection retained for register and login wire compatibility.
      required: [id, email, displayName]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 200
    CurrentUser:
      type: object
      additionalProperties: false
      description: >
        Current-user bootstrap projection. It does not contain an authoritative selected
        legal entity; clients select one locally and send it on scoped requests.
      required: [id, email, displayName, memberships]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        memberships:
          type: array
          description: Legal entity memberships available to the current user; never null.
          items:
            $ref: '#/components/schemas/LegalEntityMembership'
    CreateLegalEntityRequest:
      type: object
      additionalProperties: false
      required: [legalName, registrationNumber]
      properties:
        legalName:
          type: string
          minLength: 1
          maxLength: 200
          description: Required legal name; must be non-blank after trimming and is stored trimmed.
        registrationNumber:
          type: string
          minLength: 1
          maxLength: 100
          description: >
            Required organization registration identifier; must be non-blank after
            trimming and is stored trimmed. No global uniqueness, country, or tax
            semantics are implied by this field.
    LegalEntity:
      type: object
      additionalProperties: false
      required: [id, legalName, registrationNumber]
      properties:
        id:
          type: string
          format: uuid
        legalName:
          type: string
          minLength: 1
          maxLength: 200
        registrationNumber:
          type: string
          minLength: 1
          maxLength: 100
    LegalEntityRole:
      type: string
      description: Closed minimum Slice 2 membership role set.
      enum: [ADMIN, MEMBER]
    LegalEntityMembership:
      type: object
      additionalProperties: false
      required: [legalEntityId, legalName, registrationNumber, role]
      properties:
        legalEntityId:
          type: string
          format: uuid
        legalName:
          type: string
          minLength: 1
          maxLength: 200
        registrationNumber:
          type: string
          minLength: 1
          maxLength: 100
        role:
          $ref: '#/components/schemas/LegalEntityRole'
    LegalEntityMembershipList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          description: Memberships visible to the authenticated user; never null.
          items:
            $ref: '#/components/schemas/LegalEntityMembership'
    LegalEntityMember:
      type: object
      additionalProperties: false
      required: [userId, email, displayName, role]
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        role:
          $ref: '#/components/schemas/LegalEntityRole'
    LegalEntityMemberList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          description: Legal entity members; never null.
          items:
            $ref: '#/components/schemas/LegalEntityMember'
    CsrfToken:
      type: object
      additionalProperties: false
      required: [token, headerName]
      properties:
        token:
          type: string
          minLength: 1
          description: CSRF token value; never log or treat as an authentication credential.
        headerName:
          type: string
          const: X-CSRF-TOKEN
    ProblemDetail:
      type: object
      additionalProperties: false
      description: RFC 9457 Problem Details with stable M4Trust error identity and correlation context.
      required: [type, title, status, detail, code, correlationId]
      properties:
        type:
          type: string
          format: uri-reference
          description: Stable identifier for the problem type.
        title:
          type: string
          minLength: 1
          description: Short human-readable summary of the problem type.
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: HTTP status code for this occurrence.
        detail:
          type: string
          minLength: 1
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri-reference
          description: URI reference identifying this occurrence.
        code:
          type: string
          minLength: 1
          pattern: '^[A-Z][A-Z0-9_]*$'
          description: Stable machine-readable M4Trust error code.
        correlationId:
          type: string
          format: uuid
          description: Correlation identifier for support and diagnostics.
        errors:
          type: array
          minItems: 1
          description: Field-level details included only for validation failures.
          items:
            $ref: '#/components/schemas/FieldError'
    FieldError:
      type: object
      additionalProperties: false
      description: A single request-field validation error.
      required: [field, code, message]
      properties:
        field:
          type: string
          minLength: 1
          description: Field path using dot notation and array indexes when nested.
        code:
          type: string
          minLength: 1
          pattern: '^[A-Z][A-Z0-9_]*$'
          description: Stable machine-readable validation error code.
        message:
          type: string
          minLength: 1
          description: Human-readable validation message; clients must not use it for control flow.
