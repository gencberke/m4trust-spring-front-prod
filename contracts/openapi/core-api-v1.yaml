openapi: 3.1.0
info:
  title: M4Trust Core API
  version: 1.0.0
  description: Reviewed design contract for the same-origin Spring API consumed by the M4Trust frontend.
servers:
  - url: /api/v1
    description: Same-origin public API v1
tags:
  - name: Authentication
    description: Browser session registration, login, logout, and current-user operations.
  - name: Security
    description: Browser security bootstrap operations.
  - name: Legal Entities
    description: Legal entity creation, membership bootstrap, and organization-scoped reads.
  - name: Deals
    description: Legal-entity-scoped Deal creation, discovery, editing, and lifecycle actions.
  - name: Deal Invitations
    description: Cross-entity Deal invitation and participation operations.
  - name: Deal Documents
    description: Direct-to-private-storage contractual document upload and participant read operations.
  - name: Deal Analysis
    description: Initiator-requested asynchronous analysis of a Deal's current AVAILABLE document and participant read projections.
  - name: Deal Rule Sets
    description: Participant-readable manual extraction review and immutable accepted rule-set history.
  - name: Funding
    description: >
      Provider-independent sandbox funding foundation: buyer-ADMIN funding plan
      creation, polling-first payment operation initiation, and reconciliation.
  - name: Fulfillment
    description: >
      Seller direct-to-private-storage evidence upload and buyer-ADMIN manual
      review for one V1 primary milestone after a Deal is ACTIVE and FUNDED.
paths:
  /auth/register:
    post:
      operationId: register
      tags: [Authentication]
      summary: Register a user and create an authenticated session
      description: >
        Creates the user and automatically establishes a server-side authenticated
        session. The browser receives the opaque session only as an HttpOnly cookie.
      security:
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered and authenticated session created.
          headers:
            Location:
              description: Same-origin current-user projection path.
              schema:
                type: string
                format: uri-reference
                const: /api/v1/auth/me
            Set-Cookie:
              $ref: '#/components/headers/SessionCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '403':
          $ref: '#/components/responses/CsrfRejected'
        '409':
          $ref: '#/components/responses/EmailAlreadyExists'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /auth/login:
    post:
      operationId: login
      tags: [Authentication]
      summary: Authenticate with email and password
      description: >
        Authenticates without revealing whether an account exists and regenerates
        the server-side session identifier on success.
      security:
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded and the public current user is returned.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SessionCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/InvalidCredentials'
        '403':
          $ref: '#/components/responses/CsrfRejected'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /auth/logout:
    post:
      operationId: logout
      tags: [Authentication]
      summary: End the current authenticated session
      description: Invalidates the current server-side session and clears its cookie.
      security:
        - SessionCookie: []
          CsrfToken: []
      responses:
        '204':
          description: Session invalidated successfully; no response body is returned.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SessionCookie'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/CsrfRejected'
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [Authentication]
      summary: Get the authenticated current-user bootstrap projection
      description: >
        Returns public user fields plus the user's legal entity memberships. The
        memberships array is always present and may be empty. Active legal entity
        selection is client state and is not stored as authoritative server session state.
      security:
        - SessionCookie: []
      responses:
        '200':
          description: Active authenticated user and membership bootstrap projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/SessionRequired'
  /security/csrf:
    get:
      operationId: getCsrfToken
      tags: [Security]
      summary: Get the CSRF token for unsafe requests
      description: >
        Returns the token and header name required for unsafe browser requests.
        The token is not an authentication credential or a session identifier.
      security: []
      responses:
        '200':
          description: Current CSRF token and required request header name.
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfToken'
  /legal-entities:
    post:
      operationId: createLegalEntity
      tags: [Legal Entities]
      summary: Create a legal entity
      description: >
        Creates a legal entity in the authenticated user's tenant and creates an
        ADMIN membership for the authenticated user in the same operation. This
        bootstrap operation does not use X-M4Trust-Legal-Entity-Id because no active
        legal entity is required before creation.
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLegalEntityRequest'
      responses:
        '201':
          description: Legal entity created and creator assigned the ADMIN role.
          headers:
            Location:
              description: Same-origin path of the created legal entity.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalEntity'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/CsrfRejected'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    get:
      operationId: listLegalEntityMemberships
      tags: [Legal Entities]
      summary: List the authenticated user's legal entity memberships
      description: >
        Returns only legal entities in which the authenticated user has a membership.
        This intentionally small bootstrap list is unpaginated but uses a stable public
        list DTO. It does not require X-M4Trust-Legal-Entity-Id.
      security:
        - SessionCookie: []
      responses:
        '200':
          description: The user's legal entity memberships; items is empty when none exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalEntityMembershipList'
        '401':
          $ref: '#/components/responses/SessionRequired'
  /legal-entities/{legalEntityId}:
    get:
      operationId: getLegalEntity
      tags: [Legal Entities]
      summary: Get a legal entity detail
      description: >
        Organization-scoped read. The legal entity context header must identify the
        same legal entity as the path and is verified against the authenticated user's
        memberships. A missing, malformed, or mismatched context header returns 403.
        A nonexistent legal entity and an entity hidden from a non-member both return
        the same 404 response so existence is not disclosed.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/LegalEntityId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Legal entity visible to the authenticated member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalEntity'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/LegalEntityNotFoundOrHidden'
  /legal-entities/{legalEntityId}/members:
    get:
      operationId: listLegalEntityMembers
      tags: [Legal Entities]
      summary: List members of a legal entity
      description: >
        Organization-scoped read. The legal entity context header must identify the
        same legal entity as the path and is verified against the authenticated user's
        memberships. A missing, malformed, or mismatched context header returns 403.
        A nonexistent legal entity and an entity hidden from a non-member both return
        the same 404 response so existence and membership data are not disclosed.
        The Slice 2 member list is unpaginated and uses a stable public list DTO.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/LegalEntityId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Legal entity members; items is never null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalEntityMemberList'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/LegalEntityNotFoundOrHidden'
  /deals:
    post:
      operationId: createDeal
      tags: [Deals]
      summary: Create a Deal in DRAFT status
      description: >
        Creates a Deal for the active legal entity, which becomes the initial
        participant. The title is trimmed and must remain non-blank. The optional
        description is stored as null when omitted. No idempotency key is used in
        this slice.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/LegalEntityContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealRequest'
      responses:
        '201':
          description: Deal created in DRAFT status.
          headers:
            Location:
              description: Same-origin path of the created Deal.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDetail'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/DealScopedMutationForbidden'
        '404':
          $ref: '#/components/responses/LegalEntityNotFoundOrHidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    get:
      operationId: listDeals
      tags: [Deals]
      summary: List Deals visible to the active legal entity
      description: >
        Returns only Deals in which the active legal entity is a participant. Results
        use stable page metadata. The default sort is createdAt,desc; the backend may
        add a stable identifier tie-breaker without exposing persistence field names.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/LegalEntityContext'
        - $ref: '#/components/parameters/DealStatusFilter'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DealSort'
      responses:
        '200':
          description: Page of Deals visible to the active legal entity; items is never null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealPage'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/LegalEntityNotFoundOrHidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /deals/{dealId}:
    get:
      operationId: getDeal
      tags: [Deals]
      summary: Get a Deal detail
      description: >
        Returns the Deal only when the active legal entity is a participant.
        A nonexistent Deal and a Deal hidden from a non-participant both return
        DEAL_NOT_FOUND so existence is not disclosed.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Deal detail visible to the active legal entity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDetail'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
    patch:
      operationId: updateDeal
      tags: [Deals]
      summary: Replace the editable basic fields of a Deal
      description: >
        Replaces the complete editable basic-field set. Both title and description
        are required in the request; description may explicitly be null. A stale
        expectedVersion returns DEAL_STALE_VERSION. A Deal whose lifecycle state
        does not permit editing returns DEAL_STATE_CONFLICT.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealRequest'
      responses:
        '200':
          description: Deal basic fields updated and the current projection returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDetail'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/DealScopedMutationForbidden'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
        '409':
          $ref: '#/components/responses/DealUpdateConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /deals/{dealId}/cancel:
    post:
      operationId: cancelDeal
      tags: [Deals]
      summary: Cancel a Deal
      description: >
        Performs the explicit Deal cancellation business action. The request has no
        body. Invalid state transitions return DEAL_STATE_CONFLICT. Authorization and
        action availability are re-evaluated by the backend even when canCancel was
        previously true.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Deal cancelled and its current detail projection returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDetail'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/DealScopedMutationForbidden'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
        '409':
          $ref: '#/components/responses/DealStateConflict'
  /deals/{dealId}/parties:
    patch:
      operationId: updateDealParties
      tags: [Deals]
      summary: Atomically replace the buyer and seller assignments of a Deal
      description: >
        Atomically replaces the complete buyer/seller assignment set of a DRAFT
        Deal. buyerLegalEntityId and sellerLegalEntityId are both required: a null
        value explicitly clears that role, so neither role can be retained by
        omission. Each non-null entity must be a current Deal participant and the
        two non-null values must differ. Only the immutable Deal initiator acting
        through its active legal entity may perform this DRAFT coordination action;
        visible participants have no mutation authority. The backend re-authorizes
        this operation even when canManageParties was previously true. This action
        neither records contractual consent nor activates the Deal.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealPartiesRequest'
      responses:
        '200':
          description: Deal parties replaced atomically and the current detail projection returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDetail'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/DealScopedMutationForbidden'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
        '409':
          $ref: '#/components/responses/DealPartiesConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /deals/{dealId}/documents/upload-intents:
    post:
      operationId: createDealDocumentUploadIntent
      tags: [Deal Documents]
      summary: Create a direct private-storage upload intent for a Deal document
      description: >
        Creates a PENDING_UPLOAD document record and a short-lived presigned PUT
        target for direct browser-to-private-object-storage transfer. Spring never
        proxies document bytes. Only the immutable Deal initiator acting through its
        active legal entity may create an intent; a terminal Deal rejects it. The
        client-declared SHA-256 and size are later verified against storage and are
        not authoritative by themselves.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentUploadIntentRequest'
      responses:
        '201':
          description: PENDING_UPLOAD document and short-lived direct PUT target created.
          headers:
            Location:
              description: Same-origin path of the pending document resource.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadIntent'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/DealDocumentMutationForbidden'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
        '409':
          $ref: '#/components/responses/DealDocumentIntentConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /deals/{dealId}/documents:
    get:
      operationId: listDealDocuments
      tags: [Deal Documents]
      summary: List Deal document history
      description: >
        Returns the complete retained document history visible to every Deal
        participant, including PENDING_UPLOAD and SUPERSEDED records. A hidden or
        nonexistent Deal returns the same non-disclosing response. Document bytes
        are never returned; download requires a separately minted short-lived link.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Document history visible to the active Deal participant; items is never null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDocumentHistory'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
  /deals/{dealId}/document-analysis:
    get:
      operationId: getDealDocumentAnalysis
      tags: [Deal Analysis]
      summary: Get the current document analysis projection for a Deal
      description: >
        Returns the analysis projection for the Deal's current AVAILABLE document to
        every Deal participant. The projection is backend-derived and never exposes
        storage bytes, provider metadata, raw failure messages, or a business
        acceptance decision. When no current AVAILABLE document exists, status is
        NOT_REQUESTED and currentDocumentId is null.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Current-document analysis projection visible to the active Deal participant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDocumentAnalysis'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
    post:
      operationId: requestDealDocumentAnalysis
      tags: [Deal Analysis]
      summary: Request asynchronous analysis of a Deal's current AVAILABLE document
      description: >
        Performs the explicit initiator-only analysis request action for the Deal's
        current AVAILABLE document. Idempotency-Key is required: retrying this same
        action with the same key returns the original accepted projection, while key
        reuse for a different request returns 409 IDEMPOTENCY_KEY_REUSED. The
        operation only accepts the job asynchronously; it never waits for AI work.
        The backend re-authorizes the initiator and current-document eligibility even
        when canRequestAnalysis was previously true.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Analysis request accepted and queued; idempotent replay returns this original projection.
          headers:
            Location:
              description: Same-origin path of the current-document analysis projection.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealDocumentAnalysis'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/DealAnalysisRequestForbidden'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
        '409':
          $ref: '#/components/responses/DealDocumentAnalysisRequestConflict'
  /deals/{dealId}/extraction-review:
    get:
      operationId: getDealExtractionReview
      tags: [Deal Rule Sets]
      summary: Get the participant-readable current extraction review projection
      description: >
        Returns the canonical extracted rules and their review input for the current
        REVIEW_REQUIRED analysis to every Deal participant. This is review material,
        not ratification or contractual consent. A visible Deal without a current
        reviewable analysis returns 409 DEAL_STATE_CONFLICT; a hidden Deal remains
        non-disclosing.
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
      responses:
        '200':
          description: Current review projection visible to the active Deal participant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealExtractionReview'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/LegalEntityAccessDenied'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
        '409':
          $ref: '#/components/responses/DealReviewConflict'
  /deals/{dealId}/extraction-review/accept:
    post:
      operationId: acceptDealExtractionReview
      tags: [Deal Rule Sets]
      summary: Accept a reviewed extraction as an immutable rule-set version
      description: >
        Initiator-only bulk review action. The required target analysisId must still
        be the current REVIEW_REQUIRED analysis for the current document under the
        Deal lock. Idempotency-Key is required: replaying the same canonical request
        returns the originally created RuleSetVersion, while reuse for a different
        request returns 409 IDEMPOTENCY_KEY_REUSED. A successful action atomically
        creates one immutable RuleSetVersion, marks the analysis ACCEPTED, and moves
        the Deal current rule-set pointer. It is not ratification or commercial consent.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptExtractionReviewRequest'
      responses:
        '201':
          description: Immutable RuleSetVersion created; idempotent replay returns this original version.
          headers:
            Location:
              description: Same-origin path of the created immutable rule-set version.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleSetVersion'
        '400':
          $ref: '#/components/responses/MalformedRequest'
        '401':
          $ref: '#/components/responses/SessionRequired'
        '403':
          $ref: '#/components/responses/DealReviewAcceptanceForbidden'
        '404':
          $ref: '#/components/responses/DealOrLegalEntityNotFoundOrHidden'
        '409':
          $ref: '#/components/responses/DealReviewAcceptanceConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /deals/{dealId}/rule-set-versions:
    get:
      operationId: listDealRuleSetVersions
      tags: [Deal Rule Sets]
      summary: List immutable rule-set version history
      description: >
        Returns all immutable accepted rule-set versions for the Deal to every
