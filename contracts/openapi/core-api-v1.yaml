            application/json:
              schema: {$ref: '#/components/schemas/RatificationPackageDetail'}
        '400': {$ref: '#/components/responses/MalformedRequest'}
        '401': {$ref: '#/components/responses/SessionRequired'}
        '403': {$ref: '#/components/responses/LegalEntityAccessDenied'}
        '404': {$ref: '#/components/responses/RatificationPackageNotFoundOrHidden'}
  /deals/{dealId}/ratification-packages/{ratificationPackageId}/approve:
    post:
      operationId: approveRatificationPackage
      tags: [Deal Ratification]
      summary: Approve a ratification package for the active buyer or seller entity
      description: >
        Only an ADMIN of the package buyer or seller legal entity may approve. The
        target package version is checked under lock. One effective approval per
        entity exists; another ADMIN of that entity receives the idempotent current
        result without increasing approval count. The second required approval
