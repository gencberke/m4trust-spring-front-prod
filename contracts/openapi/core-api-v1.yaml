        '401': {$ref: '#/components/responses/SessionRequired'}
        '403': {$ref: '#/components/responses/RatificationPackageActionForbidden'}
        '404': {$ref: '#/components/responses/RatificationPackageNotFoundOrHidden'}
        '409': {$ref: '#/components/responses/RatificationPackageActionConflict'}
        '422': {$ref: '#/components/responses/ValidationFailed'}
  /deals/{dealId}/funding-plan:
    post:
      operationId: createFundingPlan
      tags: [Funding]
      summary: Explicitly create the Deal's single funding plan from the ratified package
      description: >
        Buyer entity ADMIN-only, idempotent action. The request carries only the Deal
        expectedVersion; amount and currency are never client-supplied and are copied
        server-side from the current RATIFIED package structured commercial terms. The
        Deal must be ACTIVE. Exactly one FundingPlan and one FundingUnit exist per Deal;
        a concurrent or repeated create races under the same database unique invariant
        and a second attempt returns 409. Idempotency-Key replays the original plan for
        the same canonical request; reuse with a different request returns 409
        IDEMPOTENCY_KEY_REUSED.
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/DealId'
        - $ref: '#/components/parameters/LegalEntityContext'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
