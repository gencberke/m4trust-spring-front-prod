name: Application Build

on:
  push:
    branches: [main]
    paths:
      - 'services/core-api/**'
      - 'frontend/**'
      - 'contracts/**'
      - '.github/workflows/application-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/core-api/**'
      - 'frontend/**'
      - 'contracts/**'
      - '.github/workflows/application-build.yml'

permissions:
  contents: read

jobs:
  core-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/core-api
    steps:
      - name: Checkout
        # actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Java
        # actions/setup-java@v5.6.0
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: '21'
      - name: Build and test Core API
        run: ./mvnw --batch-mode --no-transfer-progress verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        # actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Node.js
        # actions/setup-node@v6.5.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: '22'
      - name: Install frontend dependencies
        run: npm ci
      - name: Regenerate API types and fail on dirty generated output
        run: |
          npm run generate:api
          git diff --exit-code -- src/generated
      - name: Type-check and build frontend
        run: npm run build

  container-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Python
        # actions/setup-python@v5.6.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install contract validation dependencies
        run: python -m pip install -r contracts/requirements.txt
      - name: Set up Java (for image smoke jar inspection)
        # actions/setup-java@v5.6.0
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: '21'
      - name: Resolve immutable image identity and contract digests
        run: |
          echo "BUILD_TIME=$(git show -s --format='%cI' "${GITHUB_SHA}")" >> "${GITHUB_ENV}"
          DIGEST="$(python contracts/scripts/validate_contracts.py --print-digest)"
          echo "CONTRACT_BUNDLE_DIGEST=${DIGEST}" >> "${GITHUB_ENV}"
          # Release manifest digest is owned by the release pipeline; CI image builds
          # stamp the contract-bundle digest into both labels when a manifest is absent.
          echo "RELEASE_MANIFEST_DIGEST=${DIGEST}" >> "${GITHUB_ENV}"
      - name: Build Core API image from repository root
        run: |
          docker build \
            --file services/core-api/Dockerfile \
            --build-arg APP_VERSION="${GITHUB_SHA}" \
            --build-arg GIT_COMMIT_SHA="${GITHUB_SHA}" \
            --build-arg APP_ENVIRONMENT=ci \
            --build-arg BUILD_TIME="${BUILD_TIME}" \
            --build-arg CONTRACT_BUNDLE_DIGEST="${CONTRACT_BUNDLE_DIGEST}" \
            --build-arg RELEASE_MANIFEST_DIGEST="${RELEASE_MANIFEST_DIGEST}" \
            --tag "m4trust-core-api:${GITHUB_SHA}" \
            .
      - name: Build web-edge image from repository root
        run: |
          docker build \
            --file frontend/Dockerfile \
            --build-arg APP_VERSION="${GITHUB_SHA}" \
            --build-arg GIT_COMMIT_SHA="${GITHUB_SHA}" \
            --build-arg APP_ENVIRONMENT=ci \
            --build-arg BUILD_TIME="${BUILD_TIME}" \
            --tag "m4trust-web-edge:${GITHUB_SHA}" \
            .
      - name: Validate image identity, digests, and migration command
        run: |
          test "$(docker image inspect "m4trust-core-api:${GITHUB_SHA}" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "${GITHUB_SHA}"
          test "$(docker image inspect "m4trust-web-edge:${GITHUB_SHA}" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "${GITHUB_SHA}"
          test "$(docker image inspect "m4trust-core-api:${GITHUB_SHA}" --format '{{ index .Config.Labels "io.m4trust.contract-bundle-digest" }}')" = "${CONTRACT_BUNDLE_DIGEST}"
          test "$(docker image inspect "m4trust-core-api:${GITHUB_SHA}" --format '{{ index .Config.Labels "io.m4trust.release-manifest-digest" }}')" = "${RELEASE_MANIFEST_DIGEST}"
          test "$(docker image inspect "m4trust-core-api:${GITHUB_SHA}" --format '{{ .Config.User }}')" = "m4trust"
          test "$(docker image inspect "m4trust-web-edge:${GITHUB_SHA}" --format '{{ .Config.User }}')" = "caddy-runtime"
          docker run --rm --entrypoint /bin/sh "m4trust-core-api:${GITHUB_SHA}" -c 'command -v m4trust-core-api'
          chmod +x services/core-api/docker/smoke-image.sh
          ./services/core-api/docker/smoke-image.sh "m4trust-core-api:${GITHUB_SHA}"
          docker run --rm \
            --env CORE_API_ORIGIN=http://core-api.internal:8080 \
            --entrypoint caddy \
            "m4trust-web-edge:${GITHUB_SHA}" \
            validate --config /etc/caddy/Caddyfile
      - name: Smoke test web-edge routing
        run: |
          mkdir -p /tmp/m4trust-core-api-stub/api
          printf 'proxied' > /tmp/m4trust-core-api-stub/api/probe
          python3 -m http.server 19090 --directory /tmp/m4trust-core-api-stub &
          stub_pid=$!
          edge_id=$(docker run --detach --rm \
            --publish 18080:8080 \
            --add-host host.docker.internal:host-gateway \
            --env CORE_API_ORIGIN=http://host.docker.internal:19090 \
            "m4trust-web-edge:${GITHUB_SHA}")
          cleanup() {
            docker stop "${edge_id}" >/dev/null 2>&1 || true
            kill "${stub_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18080/healthz >/dev/null
          test "$(curl --fail --silent http://127.0.0.1:18080/api/probe)" = "proxied"
          curl --fail --silent http://127.0.0.1:18080/app/deals/example | grep -q '<div id="root"></div>'
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18080/actuator/info)" = "404"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18080/internal/v1/contracts)" = "404"
