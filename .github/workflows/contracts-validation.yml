name: Contract Validation

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'services/core-api/src/main/**'
      - 'frontend/src/generated/**'
      - '.github/workflows/contracts-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'services/core-api/src/main/**'
      - 'frontend/src/generated/**'
      - '.github/workflows/contracts-validation.yml'

permissions:
  contents: read

env:
  # Optional owner-supplied read-only AI baseline directory (ADR-019).
  # Leave unset to emit the exact unverified external gate; never invent AI
  # compatibility and never eval owner shell commands.
  M4TRUST_AI_CONTRACTS_ROOT: ${{ vars.M4TRUST_AI_CONTRACTS_ROOT }}

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Python
        # actions/setup-python@v5.6.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install contract validation dependencies
        run: python -m pip install -r contracts/requirements.txt
      - name: Validate contracts
        run: python contracts/scripts/validate_contracts.py
      - name: Structural OpenAPI negative matrix
        run: |
          python contracts/scripts/compare_openapi_structure.py \
            --expected contracts/openapi/core-api-v1.yaml \
            --actual contracts/openapi/core-api-v1.yaml \
            --negative-fixture
