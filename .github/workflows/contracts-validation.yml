name: Contract Validation

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts-validation.yml'

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install contract validation dependencies
        run: python -m pip install -r contracts/requirements.txt
      - name: Validate contracts
        run: python contracts/scripts/validate_contracts.py
