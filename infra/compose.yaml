name: m4trust-local

services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ${M4TRUST_POSTGRES_DB:-m4trust_local}
      POSTGRES_USER: ${M4TRUST_POSTGRES_USER:-m4trust_local}
      POSTGRES_PASSWORD: ${M4TRUST_POSTGRES_PASSWORD:-m4trust_local_password}
    ports:
      - "127.0.0.1:${M4TRUST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.1.2-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${M4TRUST_RABBITMQ_USER:-m4trust_local}
      RABBITMQ_DEFAULT_PASS: ${M4TRUST_RABBITMQ_PASSWORD:-m4trust_local_password}
    ports:
      - "127.0.0.1:${M4TRUST_RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${M4TRUST_RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  mock-ai-worker:
    profiles: ["mock-ai"]
    build:
      context: ..
      dockerfile: tools/mock-ai-worker/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      APP_ENVIRONMENT: local
      M4TRUST_MOCK_AI_ENABLED: "true"
      M4TRUST_MOCK_AI_SCENARIO: ${M4TRUST_MOCK_AI_SCENARIO:-auto}
      # Core API signs browser-reachable localhost URLs. The container connects
      # through Docker's host alias while retaining the signed Host header.
      M4TRUST_MOCK_AI_DOWNLOAD_HOST_OVERRIDE: host.docker.internal
      M4TRUST_RABBITMQ_HOST: rabbitmq
      M4TRUST_RABBITMQ_PORT: 5672
      M4TRUST_RABBITMQ_USER: ${M4TRUST_RABBITMQ_USER:-m4trust_local}
      M4TRUST_RABBITMQ_PASSWORD: ${M4TRUST_RABBITMQ_PASSWORD:-m4trust_local_password}
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${M4TRUST_MINIO_ROOT_USER:-m4trust_local}
      MINIO_ROOT_PASSWORD: ${M4TRUST_MINIO_ROOT_PASSWORD:-m4trust_local_password}
      # Explicit local origin keeps direct presigned requests credential-safe; never use '*'.
      MINIO_API_CORS_ALLOW_ORIGIN: ${M4TRUST_MINIO_CORS_ALLOWED_ORIGIN:-http://localhost:5173}
    ports:
      - "127.0.0.1:${M4TRUST_MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${M4TRUST_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9000/minio/health/live > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      M4TRUST_MINIO_ROOT_USER: ${M4TRUST_MINIO_ROOT_USER:-m4trust_local}
      M4TRUST_MINIO_ROOT_PASSWORD: ${M4TRUST_MINIO_ROOT_PASSWORD:-m4trust_local_password}
      M4TRUST_MINIO_BUCKET: ${M4TRUST_MINIO_BUCKET:-m4trust-documents}
    entrypoint: >
      /bin/sh -ec 'mc alias set local http://minio:9000 "$${M4TRUST_MINIO_ROOT_USER}" "$${M4TRUST_MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing "local/$${M4TRUST_MINIO_BUCKET}";
      mc version enable "local/$${M4TRUST_MINIO_BUCKET}";
      mc anonymous set private "local/$${M4TRUST_MINIO_BUCKET}"'
    restart: "no"

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
