name: m4trust-local

services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ${M4TRUST_POSTGRES_DB:-m4trust_local}
      POSTGRES_USER: ${M4TRUST_POSTGRES_USER:-m4trust_local}
      POSTGRES_PASSWORD: ${M4TRUST_POSTGRES_PASSWORD:-m4trust_local_password}
    ports:
      - "127.0.0.1:${M4TRUST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.1.2-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${M4TRUST_RABBITMQ_USER:-m4trust_local}
      RABBITMQ_DEFAULT_PASS: ${M4TRUST_RABBITMQ_PASSWORD:-m4trust_local_password}
    ports:
      - "127.0.0.1:${M4TRUST_RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${M4TRUST_RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${M4TRUST_MINIO_ROOT_USER:-m4trust_local}
      MINIO_ROOT_PASSWORD: ${M4TRUST_MINIO_ROOT_PASSWORD:-m4trust_local_password}
    ports:
      - "127.0.0.1:${M4TRUST_MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${M4TRUST_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9000/minio/health/live > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
